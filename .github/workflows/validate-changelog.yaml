name: Validate changelog

on:
  workflow_call: {}

permissions: {}

jobs:
  validate-changelog:
    name: Validate changelog structure
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write
    if: contains(github.event.pull_request.head.ref, '#release#')

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Extract version from branch name
        id: extract_version
        env:
          BRANCH_NAME: ${{ github.event.pull_request.head.ref }}
        run: |
          branch_name="$BRANCH_NAME"
          echo "Branch name: $branch_name"

          version=""

          # The release token is the segment after the last '#', mirroring how
          # create-release-pr.yaml parses it (awk -F# '{print $NF}'). This makes
          # matching independent of the base-branch prefix, so both naming schemes
          # work: "main#release#minor-rc" and the prefix-less "release#minor-rc".
          token="${branch_name##*#}"
          echo "Release token: $token"

          version=""

          # A semver core (X.Y.Z) may carry an optional release-candidate suffix
          # (-rc.N) that gitsemver produces, so the version patterns allow it.
          case "$token" in
            v[0-9]*)
              # Explicit version token like v1.2.3 or v1.2.3-rc.4
              version="${token#v}"
              if [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-rc\.[0-9]+)?$ ]]; then
                echo "Extracted explicit version: $version"
              else
                echo "::error::Failed to extract version from: $branch_name"
                exit 1
              fi
              ;;

            major|minor|patch|major-rc|minor-rc|patch-rc|rc|rc-release)
              # Bump-token branch: the concrete version was resolved by gitsemver
              # and written into the changelog by architect, so read it from there.
              # This covers both stable bumps and their RC variants uniformly.
              echo "🔍 Detected bump-token release branch ($token), extracting version from changelog..."

              if [ ! -f "CHANGELOG.md" ]; then
                echo "::error::CHANGELOG.md not found"
                exit 1
              fi

              # Get the first version entry (should be the newest one that architect
              # created); allow an optional -rc.N suffix for release candidates.
              version=$(grep -E "^## \[[0-9]+\.[0-9]+\.[0-9]+(-rc\.[0-9]+)?\]" CHANGELOG.md | head -1 | sed -E 's/^## \[([0-9]+\.[0-9]+\.[0-9]+(-rc\.[0-9]+)?)\].*/\1/')

              if [ -z "$version" ]; then
                echo "::error::Could not find version in CHANGELOG.md"
                echo "::error::Expected to find a line like: ## [X.Y.Z] - YYYY-MM-DD"
                echo "Available changelog entries:"
                grep -E "^## \[" CHANGELOG.md | head -5 || echo "No version entries found"
                exit 1
              fi

              echo "Extracted version from changelog for $token release: $version"
              ;;

            *)
              echo "::error::Could not extract version from branch name: $branch_name (token: $token)"
              echo "::error::Expected the branch to end in one of:"
              echo "  - #v1.2.3 (optionally -rc.N, e.g. #v1.2.3-rc.4)"
              echo "  - #major | #minor | #patch"
              echo "  - #major-rc | #minor-rc | #patch-rc"
              echo "  - #rc | #rc-release"
              exit 1
              ;;
          esac

          if [ -z "$version" ]; then
            echo "::error::Version extraction failed - version is empty"
            exit 1
          fi

          echo "Final extracted version: $version"
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Validate changelog content
        run: |
          version="${{ steps.extract_version.outputs.version }}"
          changelog_file="CHANGELOG.md"

          echo "Validating changelog content for version $version..."
          echo "Checking file: $changelog_file"

          # Check if CHANGELOG.md exists
          if [ ! -f "$changelog_file" ]; then
            echo "::error::No $changelog_file found in repository"
            exit 1
          fi

          # Extract the content between the new version and the next version
          changelog_section=$(awk "
              /^## \[$version\]/ { found=1; print; next }
              found && /^## \[/ && !/^## \[$version\]/ { found=0 }
              found { print }
          " "$changelog_file")

          if [ -z "$changelog_section" ]; then
            echo "::error::No section found for version $version in changelog"
            echo "::error::Expected format: ## [$version] - YYYY-MM-DD"
            exit 1
          fi

          echo "Found changelog section for version $version"

          # Accepted Keep a Changelog H3 sections (https://keepachangelog.com/en/1.1.0/).
          accepted_pattern='^### (Added|Changed|Deprecated|Removed|Fixed|Security)[[:space:]]*$'

          all_headers=$(echo "$changelog_section" | grep -E "^### " || true)
          accepted_headers=$(echo "$all_headers" | grep -E "$accepted_pattern" || true)
          unknown_headers=$(echo "$all_headers" | grep -Ev "$accepted_pattern" || true)

          accepted_count=0
          if [ -n "$accepted_headers" ]; then
            accepted_count=$(echo "$accepted_headers" | wc -l)
          fi

          if [ -n "$unknown_headers" ]; then
            echo "::error title=Unknown Changelog Section::Found H3 headers that are not Keep a Changelog sections"
            echo "::error::Allowed: ### Added, ### Changed, ### Deprecated, ### Removed, ### Fixed, ### Security"
            echo "Unknown headers:"
            echo "$unknown_headers" | sed 's/^/  /'
            exit 1
          fi

          if [ "$accepted_count" -eq 0 ]; then
            echo "::error title=Empty Changelog::No changelog content found for version $version"
            echo "::error::The release appears to have an empty changelog."
            echo ""
            echo "Please add content under appropriate sections like:"
            echo "  ### Added     - for new features"
            echo "  ### Changed   - for changes in existing functionality"
            echo "  ### Fixed     - for any bug fixes"
            echo "  ### Removed   - for now removed features"
            echo "  ### Deprecated - for soon-to-be removed features"
            echo "  ### Security  - in case of vulnerabilities"
            echo ""
            echo "Current changelog section:"
            echo "$changelog_section"
            exit 1
          fi

          echo "Changelog validation passed: Found $accepted_count section(s)"
          echo "Sections found:"
          echo "$accepted_headers" | sed 's/^/  /'

      - name: Add PR comment if validation fails
        if: failure()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # 9.0.0
        with:
          script: |
            const version = '${{ steps.extract_version.outputs.version }}';
            const body = `## 📝 Changelog Validation Failed

            The changelog for version **${version}** is either empty or contains H3 sections that are not part of [Keep a Changelog](https://keepachangelog.com/en/1.1.0/).

            Accepted H3 sections:
            - \`### Added\` - for new features
            - \`### Changed\` - for changes in existing functionality
            - \`### Deprecated\` - for soon-to-be removed features
            - \`### Removed\` - for now removed features
            - \`### Fixed\` - for any bug fixes
            - \`### Security\` - in case of vulnerabilities

            **Example:**
            \`\`\`markdown
            ## [${version}] - ${new Date().toISOString().split('T')[0]}

            ### Changed

            - Updated dependency X to version Y
            - Improved error handling in module Z

            ### Security

            - Bump x/crypto to 0.42.0 for CVE-2026-XXXXX
            \`\`\`

            See the job log for the exact validation error.`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
