name: Fix vulnerabilities

on:
  workflow_call:
    inputs:
      branch:
        description: Branch on which to fix vulnerabilities
        required: true
        type: string
      log_level:
        description: Log Level (info / error / debug)
        default: "info"
        type: string
    secrets:
      HERALD_APP_ID:
        description: Client ID for create-github-app-token
        required: true
      HERALD_APP_KEY:
        description: Private key for create-github-app-token
        required: true
      NANCY_TOKEN:
        description: Nancy token used to access the OSS Index database
        required: true
      NANCY_USER:
        description: Nancy user used to access the OSS Index database
        required: false

permissions: {}

jobs:
  gather_facts:
    name: Gather facts
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      branch: ${{ steps.gather_facts.outputs.branch }}
      skip: ${{ steps.gather_facts.outputs.skip }}
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ inputs.branch || github.ref }}
      - name: Gather facts
        id: gather_facts
        run: |
          head="${{ inputs.branch || github.ref }}"
          branch="${{ github.ref_name }}"

          echo "branch=${branch}" >> $GITHUB_OUTPUT

          head="${head#refs/heads/}" # Strip "refs/heads/" prefix.
          echo "head=${head}" >> $GITHUB_OUTPUT

          # Skip if there are no go mod files
          if [[ ! -e go.mod ]] && [[ ! -e go.sum ]]; then
            skip=true
            echo "There are no go mod files in the repo, skipping"
          else
            skip=false
          fi

          echo "skip=${skip}" >> $GITHUB_OUTPUT
          echo "head=\"$head\" branch=\"$branch\" skip=\"$skip\""

  run_nancy_fixer:
    name: Fix vulnerabilities with nancy-fixer
    runs-on: ubuntu-24.04
    needs:
      - gather_facts
    if: ${{ needs.gather_facts.outputs.skip != 'true' }}
    steps:
      - name: Generate a token
        id: generate_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.HERALD_APP_ID }}
          private-key: ${{ secrets.HERALD_APP_KEY }}

      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          token: ${{ steps.generate_token.outputs.token }}
          persist-credentials: false
          ref: ${{ needs.gather_facts.outputs.branch }}

      - name: Create new branch
        id: create_branch
        env:
          base: ${{ needs.gather_facts.outputs.branch }}
        run: |
          branch="remediate-vulnerabilities-${base}"
          echo "branch=${branch}" >> $GITHUB_OUTPUT
          git checkout -b "${branch}"

      - name: Run nancy-fixer fix
        uses: docker://gsoci.azurecr.io/giantswarm/nancy-fixer:0.10.1
        timeout-minutes: 20
        env:
          OSSI_USERNAME: ${{ secrets.NANCY_USER }}
          OSSI_TOKEN: ${{ secrets.NANCY_TOKEN }}
          GUIDE_TOKEN: ${{ secrets.NANCY_TOKEN }}
          LOG_LEVEL: ${{ inputs.log_level || 'info' }}

      - name: Set up git identity
        run: |
          git config --local user.email "149080493+heraldbot[bot]@users.noreply.github.com"
          git config --local user.name "HeraldBot[bot]"

      - name: Commit new files
        id: commit_changes
        run: |
          git add -A
          if git diff-index --quiet HEAD; then
            echo "No changes found"
            skip=true
          else
            git commit -m "fix(nancy): remediate nancy findings"
            skip=false
          fi
          echo "skip=${skip}" >> $GITHUB_OUTPUT

      - name: Push changes
        if: "${{ steps.commit_changes.outputs.skip != 'true' }}"
        env:
          remote_repo: "https://${{ github.actor }}:${{ steps.generate_token.outputs.token }}@github.com/${{ github.repository }}.git"
          branch: ${{ steps.create_branch.outputs.branch }}
        run: |
          git push --force "${remote_repo}" HEAD:"${branch}"

      - name: Create pull request
        env:
          GITHUB_TOKEN: "${{ steps.generate_token.outputs.token }}"
          branch: ${{ steps.create_branch.outputs.branch }}
          base: ${{ needs.gather_facts.outputs.branch }}
        if: "${{ steps.commit_changes.outputs.skip != 'true' }}"
        run: |
          if [ -z "$(gh pr list --head "${branch}" --state open --json number --jq '.[0].number')" ]; then
            gh pr create \
              --title "fix(nancy): remediate findings on ${base}" \
              --body "Fix Nancy findings on branch ${base}" \
              --head "${branch}" \
              --base "${base}"
          fi
          gh pr merge --auto --squash "${branch}"
