name: Dispatch update-chart PR closure events to central repository

on:
  workflow_call:
    inputs:
      target_repository:
        description: Repository to dispatch the events to, should be inside the giantswarm organization
        required: true
        type: string
    secrets:
      HERALD_CLIENT_ID:
        description: Client ID for create-github-app-token
        required: true
      HERALD_APP_KEY:
        description: Private key for create-github-app-token
        required: true

permissions: {}

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: generate-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.HERALD_CLIENT_ID }}
          private-key: ${{ secrets.HERALD_APP_KEY }}
          owner: giantswarm
          repositories: ${{ inputs.target_repository }}

      - name: Dispatch PR closure to central repository
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
        with:
          token: ${{ steps.generate-token.outputs.token }}
          repository: giantswarm/${{ inputs.target_repository }}
          event-type: update-chart-pr-closed
          client-payload: |
            {
              "repo": "${{ github.repository }}"
            }
