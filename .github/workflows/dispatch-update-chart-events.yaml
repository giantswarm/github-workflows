name: Dispatch update-chart events to central repository

on:
  workflow_call:
    inputs:
      target_repository:
        description: Repository to dispatch the events to, should be inside the giantswarm organization
        required: true
        type: string
      status_timeout_minutes:
        description: How long to wait for CI checks to complete before timing out
        required: false
        type: number
        default: 20
    secrets:
      HERALD_CLIENT_ID:
        description: Client ID for create-github-app-token
        required: true
      HERALD_APP_KEY:
        description: Private key for create-github-app-token
        required: true

permissions: {}

jobs:
  dispatch:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      statuses: read
    env:
      STATUS_TIMEOUT_MINUTES: ${{ inputs.status_timeout_minutes }}
    steps:
      - name: Generate GitHub App token
        id: generate-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ secrets.HERALD_CLIENT_ID }}
          private-key: ${{ secrets.HERALD_APP_KEY }}
          owner: giantswarm
          repositories: ${{ inputs.target_repository }}

      - name: Derive gitsemver dev-build identifiers
        id: gitsemver-ids
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          SHA: ${{ github.sha }}
          RAW_BRANCH: ${{ github.head_ref || github.ref_name }}
        run: |
          # gitsemver embeds the committer date (in UTC) and the branch name in
          # dev-build versions: "<base>-dev.<branch>.<YYYY-MM-DD>.<HH-MM-SS>".
          # Reconstruct both so the central repo can match the pushed chart tag.
          iso=$(gh api "repos/${REPOSITORY}/commits/${SHA}" --jq '.commit.committer.date')
          commit_datetime=$(date -u -d "${iso}" +'%Y-%m-%d.%H-%M-%S')

          # Sanitize the branch exactly like gitsemver: [^a-zA-Z0-9-]+ -> "-".
          branch=$(printf '%s' "${RAW_BRANCH}" | sed -E 's/[^a-zA-Z0-9-]+/-/g')

          echo "commit_datetime=${commit_datetime}" >> "$GITHUB_OUTPUT"
          echo "branch=${branch}" >> "$GITHUB_OUTPUT"

      - name: Dispatch to central repository
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4
        with:
          token: ${{ steps.generate-token.outputs.token }}
          repository: giantswarm/${{ inputs.target_repository }}
          event-type: update-chart
          client-payload: |
            {
              "sha": "${{ github.sha }}",
              "repo": "${{ github.repository }}",
              "branch": "${{ steps.gitsemver-ids.outputs.branch }}",
              "commit_datetime": "${{ steps.gitsemver-ids.outputs.commit_datetime }}"
            }

      - name: Wait for workflow status
        id: wait-status
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PASS_STRING="success"
          FAIL_STRING="failure"
          PENDING_STRING="waiting"

          result="$PENDING_STRING"

          TIMEOUT=$(( STATUS_TIMEOUT_MINUTES * 60 ))
          INTERVAL=30

          elapsed=0
          while [ $elapsed -lt $TIMEOUT ]; do
            # GitHub Actions workflow runs (excluding this workflow)
            gha_runs=$(gh api "repos/${{ github.repository }}/actions/runs?head_sha=${{ github.sha }}&per_page=100" \
              --jq '[.workflow_runs[] | select(.name != "${{ github.workflow }}")]')

            gha_failed=$(echo "$gha_runs" | jq '[.[] | select(.conclusion == "failure" or .conclusion == "cancelled" or .conclusion == "timed_out")] | length')
            gha_total=$(echo "$gha_runs" | jq 'length')
            gha_in_progress=$(echo "$gha_runs" | jq '[.[] | select(.status != "completed")] | length')

            # Combined commit status (e.g. CircleCI) — single aggregated state
            commit_status=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/status")
            commit_state=$(echo "$commit_status" | jq -r '.state')
            commit_total=$(echo "$commit_status" | jq '.statuses | length')

            if [ "$gha_failed" -gt 0 ] || [ "$commit_state" = "failure" ] || [ "$commit_state" = "error" ]; then
              result="$FAIL_STRING"
              break
            fi

            if [ "$gha_total" -gt 0 ] && [ "$gha_in_progress" -eq 0 ] && { [ "$commit_state" = "success" ] || [ "$commit_total" -eq 0 ]; }; then
              result="$PASS_STRING"
              break
            fi

            sleep $INTERVAL
            elapsed=$(( elapsed + INTERVAL ))
          done

          echo "result=$result" >> "$GITHUB_OUTPUT"

      - name: Dispatch workflow status to central repository
        if: always()
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4
        with:
          token: ${{ steps.generate-token.outputs.token }}
          repository: giantswarm/${{ inputs.target_repository }}
          event-type: update-chart-status
          client-payload: |
            {
              "sha": "${{ github.sha }}",
              "repo": "${{ github.repository }}",
              "branch": "${{ steps.gitsemver-ids.outputs.branch }}",
              "commit_datetime": "${{ steps.gitsemver-ids.outputs.commit_datetime }}",
              "status": "${{ steps.wait-status.outputs.result }}"
            }
