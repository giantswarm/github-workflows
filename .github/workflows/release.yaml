# Wraps googleapis/release-please-action: maintains a rolling release PR from
# Conventional Commits, and on merge cuts the tag and GitHub release. Requires
# release-please-config.json and .release-please-manifest.json in the caller
# repo (generated by devctl).

name: Release

on:
  workflow_call:
    inputs:
      auto-merge-level:
        description: "Automatically merge the Release Please PR when CI passes, up to this bump level. One of: none, patch, minor, major."
        type: string
        required: false
        default: none
    secrets:
      RELEASE_PLEASE_CLIENT_ID:
        description: Client ID for create-github-app-token
        required: true
      RELEASE_PLEASE_PRIVATE_KEY:
        description: Private key for create-github-app-token
        required: true
    outputs:
      release_created:
        description: "Set to 'true' if a release was created."
        value: ${{ jobs.release.outputs.release_created }}
      tag_name:
        description: "Tag name of the created release, e.g. v1.2.3."
        value: ${{ jobs.release.outputs.tag_name }}
      major:
        description: "Major version component of the created release."
        value: ${{ jobs.release.outputs.major }}
      minor:
        description: "Minor version component of the created release."
        value: ${{ jobs.release.outputs.minor }}
      patch:
        description: "Patch version component of the created release."
        value: ${{ jobs.release.outputs.patch }}
      pr:
        description: "Release Please PR number (open when no release was created yet)."
        value: ${{ jobs.release.outputs.pr }}

permissions: {}

jobs:
  release:
    name: Release
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release_please.outputs.release_created }}
      tag_name: ${{ steps.release_please.outputs.tag_name }}
      major: ${{ steps.release_please.outputs.major }}
      minor: ${{ steps.release_please.outputs.minor }}
      patch: ${{ steps.release_please.outputs.patch }}
      pr: ${{ steps.release_please.outputs.pr }}
    steps:
      - name: Generate GitHub App token
        id: generate_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.RELEASE_PLEASE_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_PRIVATE_KEY }}

      - name: Run release-please
        id: release_please
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ steps.generate_token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # Reconcile auto-merge on the open Release Please PR every run. release-please
      # keeps a single PR open and rewrites it as commits land, so its bump level can
      # change over time; we enable or disable auto-merge to match the current bump.
      # The bump is derived from .release-please-manifest.json (next version on the PR
      # head branch vs. current version on the base branch), which is authoritative
      # regardless of how each caller configures its PR title.
      - name: Reconcile auto-merge on the Release Please PR
        if: ${{ steps.release_please.outputs.pr != '' && inputs.auto-merge-level != 'none' }}
        env:
          GH_TOKEN: ${{ steps.generate_token.outputs.token }}
          GH_REPO: ${{ github.repository }}
          AUTO_MERGE_LEVEL: ${{ inputs.auto-merge-level }}
          PR_JSON: ${{ steps.release_please.outputs.pr }}
        run: |
          set -euo pipefail

          level_num() {
            case "$1" in
              none)  echo 0 ;;
              patch) echo 1 ;;
              minor) echo 2 ;;
              major) echo 3 ;;
              *) echo "Invalid level '$1' (expected none, patch, minor or major)" >&2; exit 1 ;;
            esac
          }
          # Fail fast on an invalid auto-merge-level input.
          level_num "$AUTO_MERGE_LEVEL" >/dev/null

          pr_number=$(jq -r '.number' <<<"$PR_JSON")
          head_branch=$(jq -r '.headBranchName' <<<"$PR_JSON")
          base_branch=$(jq -r '.baseBranchName' <<<"$PR_JSON")

          # Read the single root (".") entry of the release-please manifest at a ref.
          # On a fresh repo the manifest is an empty object until the first release lands,
          # so a missing "." key is normalized to 0.0.0 — otherwise the numeric comparisons
          # below silently fall through and the first release's bump is classified as none.
          manifest_version() {
            gh api "repos/${GH_REPO}/contents/.release-please-manifest.json?ref=$1" \
              -H "Accept: application/vnd.github.raw" | jq -r '.["."] // "0.0.0"'
          }

          current=$(manifest_version "$base_branch")
          next=$(manifest_version "$head_branch")

          IFS=. read -r cmaj cmin cpat <<<"$current"
          IFS=. read -r nmaj nmin npat <<<"$next"

          if   [ "$nmaj" -gt "$cmaj" ]; then bump=major
          elif [ "$nmin" -gt "$cmin" ]; then bump=minor
          elif [ "$npat" -gt "$cpat" ]; then bump=patch
          else bump=none
          fi

          echo "Release PR #${pr_number}: ${current} -> ${next} (${bump} bump); auto-merge-level=${AUTO_MERGE_LEVEL}"

          # Merge when the PR's bump is a real release and is no larger than the
          # configured ceiling (none < patch < minor < major).
          if [ "$(level_num "$bump")" -ge 1 ] && [ "$(level_num "$bump")" -le "$(level_num "$AUTO_MERGE_LEVEL")" ]; then
            want_merge=true
          else
            want_merge=false
          fi

          # Only mutate when the desired state differs from the current one, to avoid
          # redundant enable/disable calls (and the errors a redundant one can raise).
          enabled=$(gh pr view "$pr_number" --json autoMergeRequest --jq '.autoMergeRequest != null')

          if [ "$want_merge" = true ] && [ "$enabled" != true ]; then
            echo "Enabling auto-merge (squash) on PR #${pr_number}"
            # Soft-fail: a repo that hasn't enabled "Allow auto-merge" or hasn't granted
            # the App branch-protection bypass shouldn't break its whole release run.
            gh pr merge "$pr_number" --auto --squash \
              || echo "::warning::Could not enable auto-merge on PR #${pr_number}. Check that 'Allow auto-merge' is enabled and the release-please App can bypass branch protection."
          elif [ "$want_merge" = false ] && [ "$enabled" = true ]; then
            echo "Disabling auto-merge on PR #${pr_number}"
            # Soft-fail symmetrically with the enable path: a transient API error or a
            # race shouldn't break the release run.
            gh pr merge "$pr_number" --disable-auto \
              || echo "::warning::Could not disable auto-merge on PR #${pr_number}."
          else
            echo "Auto-merge already in desired state (enabled=${enabled}, want=${want_merge}); nothing to do"
          fi
