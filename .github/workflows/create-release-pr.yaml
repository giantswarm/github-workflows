name: Create Release PR

on:
  workflow_call:
    inputs:
      branch:
        description: "Branch (full ref) to use for this PR"
        required: true
        type: string
    secrets:
      TAYLORBOT_GITHUB_ACTION:
        description: "Token to create the pull request"
        required: true

permissions: {}

jobs:
  debug_info:
    name: Debug info
    runs-on: ubuntu-24.04
    steps:
      - name: Print github context JSON
        env:
          GITHUB_CONTEXT: ${{ toJson(github) }}
        run: echo "$GITHUB_CONTEXT"
  gather_facts:
    name: Gather facts
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      repo_name: ${{ steps.parse.outputs.repo_name }}
      branch: ${{ steps.parse.outputs.branch }}
      base: ${{ steps.parse.outputs.base }}
      needs_major_bump: ${{ steps.resolve.outputs.needs_major_bump }}
      skip: ${{ steps.check_skip.outputs.skip }}
      version: ${{ steps.resolve.outputs.version }}
      is_rc: ${{ steps.resolve.outputs.is_rc }}
    steps:
      - name: Parse trigger
        id: parse
        env:
          INPUT_BRANCH: ${{ inputs.branch }}
          EVENT_REF: ${{ github.event.ref }}
          EVENT_BASE_REF: ${{ github.event.base_ref }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          head="${INPUT_BRANCH:-$EVENT_REF}"
          echo "branch=${head}" >> $GITHUB_OUTPUT

          head_short="${head#refs/heads/}"
          if [[ $(echo "$head_short" | grep -o '#' | wc -l) -gt 1 ]]; then
            base="$(echo "$head_short" | cut -d '#' -f 1)"
          else
            base="${EVENT_BASE_REF}"
          fi
          base="${base#refs/heads/}"

          token="$(echo "$head_short" | awk -F# '{print $NF}')"
          repo_name="$(echo "$REPOSITORY" | awk -F '/' '{print $2}')"

          echo "base=${base}" >> $GITHUB_OUTPUT
          echo "token=${token}" >> $GITHUB_OUTPUT
          echo "repo_name=${repo_name}" >> $GITHUB_OUTPUT
          echo "branch=${head}  base=${base}  token=${token}  repo=${repo_name}"

      - name: Checkout base
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ steps.parse.outputs.base }}
          fetch-depth: 0
          persist-credentials: false

      - name: Install gitsemver
        uses: giantswarm/install-binary-action@5bef88f65012037dd836117c8d344b21bb559854 # v4.1.0
        with:
          binary: "gitsemver"
          # renovate: datasource=github-releases depName=giantswarm/gitsemver
          version: "2.0.0"
          download_url: "https://github.com/giantswarm/${binary}/releases/download/v${version}/${binary}-v${version}-linux-amd64.tar.gz"
          tarball_binary_path: "*/${binary}"
          smoke_test: "${binary} --version"

      - name: Resolve version
        id: resolve
        env:
          TOKEN: ${{ steps.parse.outputs.token }}
        run: |
          set -euo pipefail
          bump_tokens='^(major|minor|patch|major-rc|minor-rc|patch-rc|rc|rc-release)$'
          if [[ "$TOKEN" =~ $bump_tokens ]]; then
            version="$(gitsemver next "$TOKEN")"
          else
            candidate="${TOKEN#v}"
            if ! gitsemver validate --type any "$candidate" >/dev/null 2>&1; then
              echo "::error::Invalid version '$candidate' (must be valid semver per gitsemver)"
              exit 1
            fi
            version="$candidate"
          fi
          echo "version=${version}"
          echo "version=${version}" >> $GITHUB_OUTPUT

          # Detect a "new major" release (including its RC) for the go.mod
          # upgrade step downstream. A "new major" means X.0.0 (or X.0.0-rc.N)
          # with X > 1; X=1 is excluded to preserve legacy behaviour.
          core="${version%%-*}"
          IFS=. read -r vmaj vmin vpat <<<"$core"
          if [[ "$vmin" = "0" && "$vpat" = "0" && "$vmaj" != "1" && "$vmaj" -gt 0 ]]; then
            echo "needs_major_bump=true" >> $GITHUB_OUTPUT
          fi

          is_rc=false
          if gitsemver validate --type rc "$version" >/dev/null 2>&1; then
            is_rc=true
          fi
          echo "is_rc=${is_rc}" >> $GITHUB_OUTPUT

      - name: Check if workflow should be skipped
        id: check_skip
        env:
          GITHUB_TOKEN: "${{ secrets.TAYLORBOT_GITHUB_ACTION }}"
        run: |
          head="${{ steps.parse.outputs.branch }}"
          branch="${head#refs/heads/}" # Strip "refs/heads/" prefix.

          # Check if PR already exists
          if gh pr view --repo "${{ github.repository }}" "${branch}" --json state --jq .state | grep -i 'open' > /dev/null; then
            gh pr view --repo "${{ github.repository }}" "${branch}"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Check if the triggering commit was created by this workflow (has our trailer).
          # Only apply this check when the release branch is ahead of the base — if
          # ahead_by is 0, the branch was just created from the base and the trailer
          # (if present) belongs to a previous unrelated release on the base branch.
          base="${{ steps.parse.outputs.base }}"
          ahead_by=$(gh api "repos/${{ github.repository }}/compare/${base}...${branch}" --jq '.ahead_by' 2>/dev/null || echo "0")
          if [[ "$ahead_by" -gt "0" ]]; then
            commit_message=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}" --jq '.commit.message' 2>/dev/null || echo "")
            if [[ "$commit_message" == *"Release-Workflow-Run:"* ]]; then
              echo "Triggering commit was created by release workflow, skipping"
              echo "skip=true" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi

          echo "skip=false" >> $GITHUB_OUTPUT

  prepare_release_pr:
    name: Prepare release PR for Backstage project
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    needs:
      - gather_facts
    if: ${{ needs.gather_facts.outputs.skip != 'true' && github.repository == 'giantswarm/backstage' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.gather_facts.outputs.branch }}
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
      - uses: borales/actions-yarn@3766bb1335b98fb13c60eaf358fe20811b730a88 # v5.0.0
        with:
          cmd: install
      - name: Prepare release PR
        uses: borales/actions-yarn@3766bb1335b98fb13c60eaf358fe20811b730a88 # v5.0.0
        with:
          cmd: release
        env:
          RELEASE_VERSION: ${{ needs.gather_facts.outputs.version }}
      - name: Set up git identity
        run: |
          git config --local user.email "dev@giantswarm.io"
          git config --local user.name "taylorbot"
      - name: Create commit
        env:
          version: "${{ needs.gather_facts.outputs.version }}"
        run: |
          git add -A
          git commit -m "chore(release): v${{ env.version }} - version packages" -m "Release-Workflow-Run: ${{ github.run_id }}"
      - name: Push changes
        env:
          remote_repo: "https://${{ github.actor }}:${{ secrets.TAYLORBOT_GITHUB_ACTION }}@github.com/${{ github.repository }}.git"
        run: |
          git push "${remote_repo}" HEAD:${{ needs.gather_facts.outputs.branch }}

  create_release_pr:
    name: Create release PR
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    needs:
      - gather_facts
      - prepare_release_pr
    if: ${{ always() && needs.gather_facts.outputs.skip != 'true' }}
    env:
      architect_flags: "--organisation ${{ github.repository_owner }} --project ${{ needs.gather_facts.outputs.repo_name }}"
    steps:
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '=1.26.4'
      - name: Install architect
        uses: giantswarm/install-binary-action@5bef88f65012037dd836117c8d344b21bb559854 # v4.1.0
        with:
          binary: architect
          # renovate: datasource=github-tags depName=giantswarm/architect
          version: v8.2.1
          download_url: "https://github.com/giantswarm/architect/releases/download/${version}/architect-linux-amd64"
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.gather_facts.outputs.branch }}
          persist-credentials: false
      - name: Prepare release changes
        run: |
          architect prepare-release ${{ env.architect_flags }} --version "${{ needs.gather_facts.outputs.version }}"
      - name: Aggregate release-candidate changelogs on promotion
        env:
          version: "${{ needs.gather_facts.outputs.version }}"
          is_rc: "${{ needs.gather_facts.outputs.is_rc }}"
        run: |
          set -euo pipefail
          changelog="CHANGELOG.md"
          note_prefix="This release aggregates all changes from release candidate"

          # Only stable releases can be a promotion of an RC series. architect has
          # already moved the "Unreleased" delta into "## [<version>]"; for a stable
          # promotion we additionally merge every "## [<version>-rc.N]" section into
          # it, so the GitHub release page (built solely from the version's section)
          # shows the complete set of changes rather than just the (often empty) delta.
          if [ "${is_rc}" = "true" ]; then
            echo "RC release (${version}); no aggregation needed."
            exit 0
          fi

          if [ ! -f "${changelog}" ]; then
            echo "No ${changelog}; nothing to aggregate."
            exit 0
          fi

          core="${version}"
          core_re="${core//./\\.}" # escape dots for use in a regex

          # Release-candidate entries for this exact core, ordered oldest -> newest.
          rc_sorted="$(grep -oE "^## \[${core_re}-rc\.[0-9]+\]" "${changelog}" \
            | sed -E 's/^## \[(.*)\]$/\1/' \
            | sort -V || true)"

          if [ -z "${rc_sorted}" ]; then
            echo "No release-candidate entries found for ${core}; not a promotion."
            exit 0
          fi

          echo "Promotion detected for ${core}. Aggregating release candidates:"
          echo "${rc_sorted}" | sed 's/^/  - /'

          # Body of a "## [<ver>]" section: lines until the next "## [" header,
          # skipping link-reference definitions. Mirrors the extractor in
          # create-release.yaml so we produce exactly what the release body reads.
          extract_section() {
            awk -v ver="$1" '
              /^## \[/ {
                if (found) exit
                if (index($0, "[" ver "]")) { found = 1; next }
              }
              found {
                if ($0 ~ /^\[[^]]+\]:[ \t]*https?:\/\//) next
                if (!started && $0 ~ /^[[:space:]]*$/) next
                started = 1
                buf[++n] = $0
              }
              END {
                while (n > 0 && buf[n] ~ /^[[:space:]]*$/) n--
                for (i = 1; i <= n; i++) print buf[i]
              }
            ' "${changelog}"
          }

          # Idempotency guard (defence-in-depth on top of the check_skip job): if the
          # stable section already carries the note, this has already run.
          if extract_section "${version}" | grep -qF "${note_prefix}"; then
            echo "Stable section already aggregated; skipping."
            exit 0
          fi

          # Source stream: the "Unreleased" delta (current stable section body) first,
          # then each RC oldest -> newest. Each section begins with its own H3 headers,
          # so simple concatenation is safe for the category bucketing below.
          sources="$(mktemp)"
          extract_section "${version}" >> "${sources}"
          while IFS= read -r rcv; do
            [ -n "${rcv}" ] || continue
            extract_section "${rcv}" >> "${sources}"
          done <<< "${rc_sorted}"

          # The RC sources already passed validate-changelog.yaml (which accepts only the
          # six Keep a Changelog categories), but the "Unreleased" delta -- the first
          # source -- is not gated by that workflow (it runs only on release branches), so
          # a non-canonical H3 there would be silently dropped by the category merge below.
          # Refuse to drop content: fail loudly and point at the offending heading.
          if grep -E '^### ' "${sources}" \
            | grep -qvE '^### (Added|Changed|Deprecated|Removed|Fixed|Security)[[:space:]]*$'; then
            echo "::error::Aggregated changelog for ${version} has a non-Keep-a-Changelog H3 heading (see below); fix it and re-run." >&2
            echo "Allowed categories: Added, Changed, Deprecated, Removed, Fixed, Security (the Unreleased delta is not gated by validate-changelog.yaml)." >&2
            grep -E '^### ' "${sources}" \
              | grep -vE '^### (Added|Changed|Deprecated|Removed|Fixed|Security)[[:space:]]*$' \
              | sed 's/^/  offending heading: /' >&2
            exit 1
          fi

          first_rc="$(printf '%s\n' "${rc_sorted}" | head -1)"
          last_rc="$(printf '%s\n' "${rc_sorted}" | tail -1)"
          if [ "${first_rc}" = "${last_rc}" ]; then
            note="${note_prefix} ${first_rc}."
          else
            note="${note_prefix}s ${first_rc} through ${last_rc}."
          fi

          # Merge bullets by Keep a Changelog category, preserving insertion order
          # (Unreleased first, then RCs oldest -> newest). Emit categories in the
          # canonical order and prepend the note as the first bullet under "Changed".
          # Every H3 here is canonical (RCs passed the validator; the Unreleased delta was
          # checked just above), so the category merge drops no content.
          merged="$(mktemp)"
          awk -v note="${note}" '
            /^### / {
              cat = $0
              sub(/^### /, "", cat)
              sub(/[[:space:]]+$/, "", cat)
              current = cat
              next
            }
            {
              if (current == "") next
              if ($0 ~ /^[[:space:]]*$/) next
              content[current] = content[current] $0 "\n"
            }
            END {
              n = split("Added Changed Deprecated Removed Fixed Security", canon, " ")
              for (i = 1; i <= n; i++) {
                c = canon[i]
                body = content[c]
                if (c == "Changed") body = "- " note "\n" body
                if (body != "") printf "### %s\n\n%s\n", c, body
              }
            }
          ' "${sources}" > "${merged}"

          # The splice below lands the merged body inside the "## [<version>]" header that
          # architect created. If that header is absent, the merged content would be
          # silently discarded, leaving the changelog unchanged while this step logs
          # success -- fail instead so the problem is visible.
          if ! grep -qE "^## \[${core_re}\]" "${changelog}"; then
            echo "::error::Stable section \"## [${version}]\" not found in ${changelog}; cannot splice (did 'architect prepare-release' run?)." >&2
            exit 1
          fi

          # Splice the merged content back into the "## [<version>]" section, replacing
          # only its body; the RC sections, link references and the "Unreleased" heading
          # are left untouched.
          updated="$(mktemp)"
          awk -v ver="${version}" -v mfile="${merged}" '
            BEGIN { while ((getline line < mfile) > 0) merged = merged line "\n" }
            /^## \[/ {
              if (inSection) inSection = 0
              if (index($0, "[" ver "]")) {
                print
                printf "\n%s", merged
                inSection = 1
                next
              }
            }
            inSection { next }
            { print }
          ' "${changelog}" > "${updated}"

          mv "${updated}" "${changelog}"
          rm -f "${sources}" "${merged}"

          echo "Aggregated changelog for ${version}:"
          extract_section "${version}"
      - name: Update version field in Chart.yaml
        run: |
          # Define chart_dir
          repository="${{ needs.gather_facts.outputs.repo_name }}"
          chart="helm/${repository}"

          # Check chart directory.
          if [ ! -d "${chart}" ]
          then
            echo "Could not find chart directory '${chart}', adding app suffix."

            # Add app suffix.
            chart="helm/${repository}-app"

            # Check chart directory with app suffix.
            if [ ! -d "${chart}" ]
            then
              echo "Could not find chart directory '${chart}', removing app suffix."

              # Remove app suffix.
              chart="helm/${repository%-app}"

              if [ ! -d "${chart}" ]
              then
                # Print error.
                echo "Could not find chart directory '${chart}', doing nothing."
              fi
            fi
          fi

          # Define chart YAML.
          chart_yaml="${chart}/Chart.yaml"

          # Check chart YAML.
          if [ -f "${chart_yaml}" ]
          then
            # check if version in Chart.yaml is templated using architect
            if [ $(grep -c "^version:.*\.Version.*$" "${chart_yaml}") = "0" ]; then
              yq -i '.version = "${{ needs.gather_facts.outputs.version }}"' "${chart_yaml}"
            fi

            # Check if ABS is configured for the project.
            if [ -f ".abs/main.yaml" ]; then
              # Check if replace-app-version-with-git is enabled in ABS config.
              if [ "$(yq '.replace-app-version-with-git' '.abs/main.yaml')" = "true" ]; then
                yq -i '.appVersion = "${{ needs.gather_facts.outputs.version }}"' "${chart_yaml}"
              fi
            fi
          fi

      - name: Bump go module defined in go.mod if needed
        run: |
          if [ "${{ needs.gather_facts.outputs.needs_major_bump }}" = true ] && test -f "go.mod"; then
            go install github.com/marwan-at-work/mod/cmd/mod@v0.9.0
            mod upgrade
          fi
      - name: Set up git identity
        run: |
          git config --local user.email "dev@giantswarm.io"
          git config --local user.name "taylorbot"
      - name: Create release commit
        env:
          version: "${{ needs.gather_facts.outputs.version }}"
        run: |
          git add -A
          git commit -m "chore(release): v${{ env.version }}" -m "Release-Workflow-Run: ${{ github.run_id }}"
      - name: Push changes
        env:
          remote_repo: "https://${{ github.actor }}:${{ secrets.TAYLORBOT_GITHUB_ACTION }}@github.com/${{ github.repository }}.git"
        run: |
          git push "${remote_repo}" HEAD:${{ needs.gather_facts.outputs.branch }}
      - name: Create PR
        env:
          GITHUB_TOKEN: "${{ secrets.TAYLORBOT_GITHUB_ACTION }}"
          base: "${{ needs.gather_facts.outputs.base }}"
          version: "${{ needs.gather_facts.outputs.version }}"
        run: |
          gh pr create --assignee ${{ github.actor }} --title "chore(release): v${{ env.version }}" --body "" --base ${{ env.base }} --head "${{ needs.gather_facts.outputs.branch }}"
