name: GitHub Actions Security Analysis with zizmor 🌈

on:
  workflow_call: {}

permissions: {}

jobs:
  analyze-github-actions:
    name: analyze-github-actions
    runs-on: ubuntu-24.04
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Merge zizmor configurations dynamically
        run: |
          BASE_CONFIG=".github/zizmor.base.yml"
          LOCAL_CONFIG=".github/zizmor.yml"
          TMP_MERGED="zizmor.tmp.yml"

          if [[ -f "$BASE_CONFIG" && -f "$LOCAL_CONFIG" ]]; then
            echo "Both base and local configurations found. Deep merging..."
            # Deep merge: local config overrides base config.
            # Arrays (like rule ignores) will be concatenated, not overwritten.
            yq eval-all '. as $item ireduce ({}; . *+ $item)' "$BASE_CONFIG" "$LOCAL_CONFIG" > "$TMP_MERGED"
            mv "$TMP_MERGED" "$LOCAL_CONFIG"
            echo "Merge complete."

          elif [[ -f "$BASE_CONFIG" && ! -f "$LOCAL_CONFIG" ]]; then
            echo "Only base configuration found. Copying to standard path..."
            cp "$BASE_CONFIG" "$LOCAL_CONFIG"

          elif [[ -f "$LOCAL_CONFIG" ]]; then
            echo "Only local configuration found. Proceeding as-is."

          else
            echo "No zizmor configuration found. Using default internal rules."
          fi
        shell: bash

      - name: Run zizmor 🌈
        uses: zizmorcore/zizmor-action@6fc4b006235f201fdab3722e17240ab420d580e5 # v0.6.1
